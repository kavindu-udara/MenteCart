
services:
  mongodb:
    image: mongo:latest
    container_name: mentecart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mentecartdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - mentecart_network
    
  redis:
    image: redis:latest
    container_name: mentecart-redis
    ports:
      - "6379:6379"
    networks:
      - mentecart_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentecart-app
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - mentecart_network

volumes:
  mongodb_data:

networks:
  mentecart_network:
    driver: bridge
