version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mentecart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: mentecartdb
    volumes:
      - mongodb_data:/data/db
    networks:
      - mentecart_network
    
  redis:
    image: redis:latest
    container_name: mentecart-redis
    ports:
      - "6379:6379"
    networks:
      - mentecart_network

volumes:
  mongodb_data:

networks:
  mentecart_network:
    driver: bridge
